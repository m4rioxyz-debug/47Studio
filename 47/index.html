<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FourtysevenStudio - Coming Soon</title>
  <meta name="description" content="FourtysevenStudio - Something extraordinary is coming soon. Modern digital experiences are in the works.">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Ambient background glow elements -->
  <div class="glow-bg">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
  </div>

  <main class="container">
    <!-- Header Section -->
    <header class="header animate-fade-in">
      <div class="logo">
        <span class="logo-accent">47</span>Studio
      </div>
      <div class="status-badge">
        <span class="status-dot"></span> Under Construction
      </div>
    </header>

    <!-- Hero Content -->
    <section class="hero-content">
      <h1 class="title animate-slide-up">
        Fourtyseven<span class="text-gradient">Studio</span>
      </h1>
      <p class="subtitle animate-slide-up-delayed">
        Crafting premium digital products, high-end interfaces, and immersive web solutions. Something extraordinary is shaping up.
      </p>

      <!-- Email signup form -->
      <form class="signup-form animate-fade-in-delayed" onsubmit="event.preventDefault(); alert('Thank you! We will keep you updated.');">
        <div class="input-wrapper">
          <input type="email" placeholder="Enter your email address" required aria-label="Email Address">
          <button type="submit" class="btn-primary">
            <span>Notify Me</span>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="btn-icon">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
            </svg>
          </button>
        </div>
      </form>
    </section>
